server:
  port: 8080

spring:
  application:
    name: happy-hands-server
  datasource:
    url: jdbc:mysql://localhost:3306/happy_hands?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Tokyo
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
